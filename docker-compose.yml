# Base compose file for development.
# Starts only infrastructure services (Postgres, Redis, NATS, Mockoon).
# Application services should be run locally for hot-reload development.
#
# Usage:
#   docker compose up -d               # Start infrastructure only
#   docker compose down                  # Stop infrastructure
#   docker compose -f docker-compose.ci.yml up --build -d  # CI: full stack

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: wa-crm-postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: wacrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d wacrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wa-crm-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: wa-crm-nats
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  mockoon:
    image: mockoon/cli:latest
    container_name: wa-crm-mockoon
    ports:
      - "1080:3000"
    volumes:
      - ./mockoon/meta-mock.json:/data:ro
    command: ["--data", "/data", "--port", "3000"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
